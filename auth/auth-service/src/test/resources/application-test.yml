# ============================================================
# 测试专用配置 (Profile: test)
# 屏蔽所有外部基础设施依赖，保证测试在离线环境中可以运行
# ============================================================

spring:
  cloud:
    # 禁用Nacos服务注册与发现，避免测试时连接Nacos Server
    nacos:
      discovery:
        enabled: false
    # 禁用Feign客户端负载均衡（和Nacos联动）
    loadbalancer:
      enabled: false

  # Redis连接配置（单元测试无需真实Redis；集成测试由Testcontainers动态覆盖）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 2
          max-idle: 2
          min-idle: 0

# ============================================================
# 禁用限流（避免测试请求被限频）
# ============================================================
pot:
  ratelimit:
    enabled: false
  # 禁用Touch框架（避免与auth域VerificationCodeService产生bean名称冲突）
  touch:
    enabled: false
  # 禁用MQ框架（测试无需消息队列，避免缺少MessageProducer bean）
  mq:
    enabled: false

# ============================================================
# Auth服务 - 测试级别配置
# ============================================================
auth:
  token:
    jwt:
      # 使用主代码中已有的RSA密钥文件（单元测试中通过MockBean绕过，集成测试需要）
      private-key-location: classpath:keys/jwt_private_key.pem
      public-key-location: classpath:keys/jwt_public_key.pem
      access-token-ttl: 3600
      refresh-token-ttl: 2592000
      refresh-token-sliding-window: 604800

  # 禁用member/admin适配器以避免Feign Client连接
  user-domain:
    member:
      enabled: false
    admin:
      enabled: false

  # 禁用权限变更消息推送（测试无MQ环境）
  permission:
    mq:
      enabled: false
    cache:
      redis-ttl: 3600
      local-ttl: 300
      local-max-size: 1000
      bloom-capacity: 1000
      bloom-fpp: 0.01

# ============================================================
# 简化日志（减少测试噪音）
# ============================================================
logging:
  level:
    "[com.pot.auth]": INFO
    "[org.springframework]": WARN
    "[org.testcontainers]": INFO
