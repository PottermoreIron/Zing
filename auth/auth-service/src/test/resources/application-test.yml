# ============================================================
# Test profile configuration
# Disable external infrastructure so tests can run offline.
# ============================================================

spring:
  cloud:
    # Disable Nacos discovery to avoid external service registration during tests.
    nacos:
      discovery:
        enabled: false
    # Disable Feign-side load balancing because it depends on service discovery.
    loadbalancer:
      enabled: false

  # Keep a local Redis fallback; integration tests override these values through Testcontainers.
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 2
          max-idle: 2
          min-idle: 0

# ============================================================
# Disable rate limiting for test requests.
# ============================================================
pot:
  ratelimit:
    enabled: false
  # Disable the touch module to avoid bean-name conflicts with auth verification-code services.
  touch:
    enabled: false
  # Disable MQ infrastructure because tests do not need message producers.
  mq:
    enabled: false

# ============================================================
# Auth-service test overrides
# ============================================================
auth:
  token:
    jwt:
      # Reuse the checked-in RSA keys; unit tests mock JWT ports and integration tests need real keys.
      private-key-location: classpath:keys/jwt_private_key.pem
      public-key-location: classpath:keys/jwt_public_key.pem
      access-token-ttl: 3600
      refresh-token-ttl: 2592000
      refresh-token-sliding-window: 604800

  # Disable member and admin adapters to avoid Feign client connections.
  user-domain:
    member:
      enabled: false
    admin:
      enabled: false

  # Disable permission-change message publishing in the test environment.
  permission:
    mq:
      enabled: false
    cache:
      redis-ttl: 3600
      local-ttl: 300
      local-max-size: 1000
      bloom-capacity: 1000
      bloom-fpp: 0.01

# ============================================================
# Reduce test log noise
# ============================================================
logging:
  level:
    "[com.pot.auth]": INFO
    "[org.springframework]": WARN
    "[org.testcontainers]": INFO
