server:
  port: 8081

spring:
  profiles:
    active: dev
  application:
    name: auth-service
  config:
    import:
      - optional:classpath:auth-verification-code.yml

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: dev
        group:
          DEFAULT_GROUP
          # Allow startup to continue when Nacos is unavailable in local development.
        fail-fast: false
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        # Redis connection settings.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 3000ms

  # RabbitMQ connection settings.
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

# Rate limiting settings.
pot:
  ratelimit:
    enabled: true
    # Use Redis to enforce rate limits across service instances.
    provider: redis

# Auth service settings.
auth:
  # Supported cache types: redis, local, or composite.
  cache:
    type: redis

  # Token settings.
  token:
    # Supported token providers: spring-security or shiro.
    provider: spring-security
    # JWT settings.
    jwt:
      # Resource location of the RSA private key.
      private-key-location: classpath:keys/jwt_private_key.pem
      # Resource location of the RSA public key.
      public-key-location: classpath:keys/jwt_public_key.pem
      # Access token lifetime in seconds.
      access-token-ttl: 3600
      # Refresh token lifetime in seconds.
      refresh-token-ttl: 2592000
      # Sliding refresh window in seconds.
      refresh-token-sliding-window: 604800

  # Distributed lock settings.
  lock:
    type: redis

  # User-domain toggles.
  user-domain:
    member:
      enabled: true
    admin:
      enabled: false

  # Third-party OAuth2 login settings.
  oauth2:
    enabled: false
    providers:
      google:
        client-id: ${GOOGLE_CLIENT_ID:}
        client-secret: ${GOOGLE_CLIENT_SECRET:}
      github:
        client-id: ${GITHUB_CLIENT_ID:}
        client-secret: ${GITHUB_CLIENT_SECRET:}
      facebook:
        client-id: ${FACEBOOK_CLIENT_ID:}
        client-secret: ${FACEBOOK_CLIENT_SECRET:}
      apple:
        client-id: ${APPLE_CLIENT_ID:}
        client-secret: ${APPLE_CLIENT_SECRET:}

  # WeChat login settings.
  wechat:
    enabled: false
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}

  # Permission-system settings.
  permission:
    # Permission cache settings.
    cache:
      # Redis cache TTL in seconds.
      redis-ttl: 3600
      # Enable permission-version validation.
      version-enabled: true
      # Local cache TTL in seconds.
      local-ttl: 300
      # Maximum number of local cache entries.
      local-max-size: 10000
      # Expected Bloom filter capacity.
      bloom-capacity: 100000
      # Bloom filter false-positive rate.
      bloom-fpp: 0.01

    # Message queue settings.
    mq:
      # Exchange name.
      exchange: auth.permission.exchange
      # Queue name.
      queue: auth.permission.changed
      # Routing key.
      routing-key: permission.changed
      # Enable MQ-based permission change propagation.
      enabled: true

    # Permission expression settings.
    expression:
      # Enable expression caching.
      cache-enabled: true
      # Maximum expression cache size.
      cache-size: 1000

# SpringDoc OpenAPI settings.
springdoc:
  api-docs:
    enabled: true
    # Gateway routes /auth/** to auth-service without stripping the /auth prefix,
    # so the api-docs path must include /auth to be reachable via /auth/v3/api-docs.
    path: /auth/v3/api-docs
  swagger-ui:
    # Expand operations by default.
    doc-expansion: list
    # Show request duration in the UI.
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha

# Logging configuration.
logging:
  level:
    com.pot.auth: DEBUG
    org.springframework.security: DEBUG
  pattern:
    # Include X-Trace-Id so service logs can be correlated with gateway logs.
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{X-Trace-Id:-}] %logger{50} - %msg%n"
