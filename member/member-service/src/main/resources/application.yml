spring:
  application:
    name: member-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
        group: DEFAULT_GROUP
        fail-fast: false
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:member}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:000802}

  # RabbitMQ connection settings.
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

  # Flyway migration settings.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true

server:
  port: 11000
pot:
  code:
    generator:
      host: ${DB_HOST:localhost}
      port: ${DB_PORT:3306}
      database: ${DB_NAME:member}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:000802}
      base-package: com.pot.member.service
      module-name: ""
      project-path: /Users/yecao/Project/Pot/Zing/zing/member/member-service
      author: Pot
      table-prefix: member_
      enable-lombok: true
      rest-controller: true
      enabled: true

# SpringDoc OpenAPI settings.
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    doc-expansion: list
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha

# Logging configuration.
logging:
  level:
    com.pot.member: DEBUG
