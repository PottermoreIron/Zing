server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway

  # Disable Spring Boot's default static-resource handler (catch-all "/**").
  # Gateway routing (RoutePredicateHandlerMapping, order=1) must not be preempted
  # by the static-resource RouterFunction (RouterFunctionMapping, order=-1).
  # SpringDoc Swagger UI still works via its own /webjars/** and /swagger-ui/** handlers.
  web:
    resources:
      add-mappings: false

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: DEFAULT_GROUP

    gateway:
      # Remove headers that downstream services should not expose to clients.
      default-filters:
        - RemoveResponseHeader=X-Powered-By
        - RemoveResponseHeader=Server

      # Route prefixes follow the service name. Auth keeps its controller prefix,
      # while member, im, and admin strip one leading path segment.
      routes:
        # Auth service keeps the /auth controller prefix.
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-service-cb
                fallbackUri: forward:/fallback

        # Member service strips /member before forwarding.
        - id: member-service
          uri: lb://member-service
          predicates:
            - Path=/member/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: member-service-cb
                fallbackUri: forward:/fallback

        # IM service strips /im before forwarding.
        - id: im-service
          uri: lb://im-service
          predicates:
            - Path=/im/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: im-service-cb
                fallbackUri: forward:/fallback

        # Admin service strips /admin before forwarding.
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: admin-service-cb
                fallbackUri: forward:/fallback

  # Redis settings used by gateway authorization checks.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 3000ms

# JWT verification settings.
gateway:
  jwt:
    # Set gateway.jwt.public-key when the PEM content is injected directly.
    public-key-location: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt_public_key.pem}

  # Route groups used by the authorization filter.
  security:
    white-list:
      - /auth/api/v1/login
      - /auth/api/v1/register
      - /auth/api/v1/refresh
      - /auth/api/v1/authenticate
      - /auth/code/email
      - /auth/code/sms
      - /actuator/health
      # OpenAPI aggregation endpoints.
      - /swagger-ui
      - /webjars
      - /v3/api-docs
      - /auth/v3/api-docs
      - /member/v3/api-docs
    internal-path-prefixes:
      - /internal/
      - /member/internal/

# SpringDoc OpenAPI aggregation across downstream services.
springdoc:
  swagger-ui:
    # List downstream service API docs as separate tabs.
    urls:
      - name: auth-service
        url: /auth/v3/api-docs
      - name: member-service
        url: /member/v3/api-docs
    disable-swagger-default-url: true
  # Expose gateway's own actuator/health in the API definition.
  show-actuator: false

# Circuit breaker settings for downstream services.
resilience4j:
  circuitbreaker:
    configs:
      # Shared defaults for all downstream services.
      default:
        # Sample size for the rolling window.
        sliding-window-size: 10
        # Open the circuit when the failure rate reaches 50%.
        failure-rate-threshold: 50
        # Calls slower than this threshold count as slow calls.
        slow-call-duration-threshold: 3s
        # Open the circuit when the slow-call rate reaches 50%.
        slow-call-rate-threshold: 50
        # Number of probe calls allowed while half-open.
        permitted-number-of-calls-in-half-open-state: 5
        # Wait time before moving from open to half-open.
        wait-duration-in-open-state: 10s
        # Transition from open to half-open without manual intervention.
        automatic-transition-from-open-to-half-open-enabled: true
        # Ignore these exceptions when calculating the failure rate.
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException
    instances:
      auth-service-cb:
        base-config: default
        wait-duration-in-open-state: 5s # Auth usually recovers quickly, so shorten the open interval.
      member-service-cb:
        base-config: default
      im-service-cb:
        base-config: default
      admin-service-cb:
        base-config: default

# Gateway logging configuration.
logging:
  level:
    "[com.pot.gateway]": DEBUG
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{X-Trace-Id:-}] %logger{36} - %msg%n"
