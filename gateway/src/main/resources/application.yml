server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: DEFAULT_GROUP

    gateway:
      # ----------------------------------------------------------------
      # 全局默认过滤器（作用于所有路由）
      # ----------------------------------------------------------------
      default-filters:
        # 移除下游服务不应暴露给客户端的内部 Header
        - RemoveResponseHeader=X-Powered-By
        - RemoveResponseHeader=Server

      # ----------------------------------------------------------------
      # 服务路由规则
      # 规则：网关以服务名作为路径前缀，下游服务保留自身路径结构。
      #
      # auth-service   : 无 StripPrefix（控制器已有 /auth 前缀）
      # member-service : StripPrefix=1（剥离 /member，控制器无服务前缀）
      # im-service     : StripPrefix=1（剥离 /im，控制器无服务前缀）
      # admin-service  : StripPrefix=1（剥离 /admin，控制器无服务前缀）
      # ----------------------------------------------------------------
      routes:
        # ── Auth 认证服务 ──────────────────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-service-cb
                fallbackUri: forward:/fallback

        # ── Member 会员服务 ────────────────────────────────────────────
        - id: member-service
          uri: lb://member-service
          predicates:
            - Path=/member/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: member-service-cb
                fallbackUri: forward:/fallback

        # ── IM 即时通讯服务 ────────────────────────────────────────────
        - id: im-service
          uri: lb://im-service
          predicates:
            - Path=/im/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: im-service-cb
                fallbackUri: forward:/fallback

        # ── Admin 管理后台服务 ─────────────────────────────────────────
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: admin-service-cb
                fallbackUri: forward:/fallback

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 3000ms

# ----------------------------------------------------------------
# JWT 配置
# ----------------------------------------------------------------
gateway:
  jwt:
    public-key-location: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt_public_key.pem}
    # public-key: ${JWT_PUBLIC_KEY:}   # 也可直接配置 Base64 公钥字符串

  # ----------------------------------------------------------------
  # 安全配置（白名单 & 内部路径）
  # ----------------------------------------------------------------
  security:
    white-list:
      - /auth/api/v1/login
      - /auth/api/v1/register
      - /auth/api/v1/refresh
      - /auth/api/v1/authenticate
      - /auth/code/email
      - /auth/code/sms
      - /actuator/health
    internal-path-prefixes:
      - /internal/
      - /member/internal/

# ----------------------------------------------------------------
# Resilience4j 熔断器配置
# ----------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      # 所有服务共享的默认配置
      default:
        # 滑动窗口大小（最近 10 次请求）
        sliding-window-size: 10
        # 故障率阈值（50% 失败则开启熔断）
        failure-rate-threshold: 50
        # 慢调用时间阈值（超过 3s 视为慢调用）
        slow-call-duration-threshold: 3s
        # 慢调用比率阈值（50% 慢调用则开启熔断）
        slow-call-rate-threshold: 50
        # 半开状态允许的探测请求数
        permitted-number-of-calls-in-half-open-state: 5
        # 熔断器打开后等待时间（10s 后进入半开状态）
        wait-duration-in-open-state: 10s
        # 自动从 OPEN → HALF_OPEN
        automatic-transition-from-open-to-half-open-enabled: true
        # 忽略以下异常（不计入失败率）
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException
    instances:
      auth-service-cb:
        base-config: default
        wait-duration-in-open-state: 5s # auth 服务恢复快，缩短等待
      member-service-cb:
        base-config: default
      im-service-cb:
        base-config: default
      admin-service-cb:
        base-config: default

# ----------------------------------------------------------------
# 日志配置
# ----------------------------------------------------------------
logging:
  level:
    com.pot.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{X-Trace-Id:-}] %logger{36} - %msg%n"
